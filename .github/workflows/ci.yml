name: ci
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      # Repo intentionally doesn't commit package-lock.json (.gitignore line 47,
      # mirroring the R&D convention). `npm ci` requires a lockfile, so use install.
      # postinstall runs `prisma generate || true` automatically.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      # Bundles prisma generate + tsc --noEmit. Devs run `npm run verify` before
      # pushing; CI runs the same. ESLint is intentionally not in this job —
      # the config now loads cleanly (eslint-config-next's native flat config,
      # no FlatCompat) but the codebase has a backlog of react-hooks rule
      # violations to clean up before lint can gate merges.
      - name: Verify
        run: npm run verify

      # Informational only — Dependabot opens PRs for fixes, so don't block CI
      # on transitive vulns. --omit=dev skips devDependencies which often have
      # noisy advisories that don't affect production.
      - name: Audit production dependencies
        run: npm audit --audit-level=high --omit=dev || true
